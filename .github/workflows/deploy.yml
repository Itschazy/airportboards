name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/airportsboard
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e node_modules -e .env.local
            rm -rf node_modules package-lock.json
            npm install
            echo "AIRLABS_API_KEY=${{ secrets.AIRLABS_API_KEY }}" > .env.local
            npm run build
            AIRLABS_API_KEY=${{ secrets.AIRLABS_API_KEY }} pm2 restart airportsboard --update-env
            pm2 save
