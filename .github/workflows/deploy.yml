name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/airportsboard
            git pull origin main
            npm ci
            npm install lightningcss-linux-x64-gnu --save-optional 2>/dev/null || true
            npm run build
            pm2 restart airportsboard
            pm2 save
