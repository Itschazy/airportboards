name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/airportsboard
            git stash
            git pull origin main
            rm -rf node_modules package-lock.json
            npm install
            echo "AIRLABS_API_KEY=${{ secrets.AIRLABS_API_KEY }}" > .env.local
            npm run build
            AIRLABS_API_KEY=${{ secrets.AIRLABS_API_KEY }} pm2 restart airportsboard
            pm2 save
